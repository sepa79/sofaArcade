services:
  sync-server:
    build:
      context: .
      dockerfile: apps/sync-server/Dockerfile
    ports:
      - "8788:8788"
    environment:
      SYNC_SERVER_PORT: 8788
      SYNC_SAMPLE_RATE_HZ: 44100
      SYNC_CURVE_FPS: 50
      SYNC_BEATS_PER_BAR: 4
    volumes:
      - ./apps/sync-server/data:/app/apps/sync-server/data
